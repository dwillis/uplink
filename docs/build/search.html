<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <footer class="site-footer">
    <div class="container">
      <p>Uplink newsletter archive · <a href="https://github.com/dwillis/uplink">GitHub</a></p>
