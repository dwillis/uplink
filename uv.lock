    { name = "llm-ollama" },
    { name = "pillow" },
    { name = "pypdfium2" },
]

[package.metadata]
requires-dist = [
    { name = "llm", specifier = ">=0.27" },
    { name = "llm-anthropic", specifier = ">=0.24" },
    { name = "pypdf", specifier = ">=5.9.0" },
    { name = "python-slugify", specifier = ">=8.0.4" },
]

[package.metadata.requires-dev]
local = [
    { name = "llm-ollama", specifier = ">=0.13" },
    { name = "pillow", specifier = ">=10.0" },
    { name = "pypdfium2", specifier = ">=4.30" },
]
